<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Seller Login</title>
<link rel="stylesheet" th:href="@{/css/reset.css}">
<link rel="stylesheet" th:href="@{/css/seller/seller-login.css}">
</head>
<body>
	<nav>
		<ul>
			<li><a th:href="@{/}">Home</a></li>
			<li><a th:href="@{#}">About Us</a></li>
			<li><a th:href="@{/land-register/seller/register}">Seller
					Registration</a></li>
		</ul>
	</nav>

	<div class="container">
		<h2>Seller Login</h2>
		<form th:action="@{/land-register/seller/login}" method="post"
			th:object="${seller}">
			<div>
				<label for="email">Email:</label> <input type="email" id="email"
					th:field="*{email}" required />
			</div>
			<div>
				<label for="password">Password:</label> <input type="password"
					id="password" th:field="*{password}" required />
			</div>
			<div class="btn-container">
				<button type="submit">Seller Login</button>
			</div>

			<!-- display error message -->
			<div th:if="${error}" class="error-message">
				<p th:text="${error}"></p>
			</div>
		</form>
	</div>
</body>
</html>
