spring.application.name=landregistration

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/land_registration?allowPublicKeyRetrieval=true&useSSL=false&useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# set file upload size to handle larger files
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# logback config
logging.config=classpath:logback-spring.xml

#------------PDF Genration properties---------------------
pdfDir=D:/MohanWorkspace/MyProject/LandRegistration/land-purchase-pdf/
reportFileName=-Land-Purchased-Document
reportFileNameDateFormat=dd_MMMM_yyyy
localDateFormat="dd MMMM yyyy HH:mm:ss"

title=Land Registration Document
subTitle=Purchased Land Details:
footer=Land Purchased Successfully.